<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WD - Wo & Da</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="WD Logistik">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; --success: #28a745; --info: #17a2b8; --warning: #ffc107; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 0 auto; padding: 10px; background: var(--bg); color: var(--text); }
        
        /* Header-Struktur stabil halten */
        .header-area { 
    display: flex; 
    justify-content: center; /* Zentriert den Titel */
    align-items: center; 
    position: relative; 
    margin-bottom: 20px;
    min-height: 40px; /* Gibt dem Bereich eine feste Höhe */
}

        h1 { text-align: center; color: var(--primary); margin: 0; display: inline-block; }
        .ruler-trigger { 
    position: absolute;    /* Löst das Lineal aus dem Textfluss */
    left: calc(30% + 10px); /* 50% ist die Mitte, + 90px schiebt es rechts neben die Logistik */
    font-size: 1.6rem; 
    background: none; 
    border: none; 
    cursor: pointer;
    padding: 0;
    line-height: 1;
    white-space: nowrap;
}

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--primary); font-size: 1.1rem; }
        
        button { padding: 12px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 5px; }
        button.edit { background: var(--warning); color: #333; width: auto; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        button.delete { background: var(--danger); width: auto; padding: 5px 10px; font-size: 0.8rem; }
        button.copy { background: var(--success); width: auto; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        button.info { background: var(--info); width: auto; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        
        select, input { padding: 12px; width: 100%; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .scroll-area { max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        
        .suggestion-box { border: 1px solid #ddd; background: white; max-height: 150px; overflow-y: auto; display: none; border-radius: 8px; position: absolute; width: calc(100% - 30px); z-index: 10; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .suggestion-item:hover { background: #f0f0f0; }
        .file-actions { display: flex; gap: 10px; margin-top: 20px; }
        .file-actions button { background: #6c757d; font-size: 0.9rem; }

        /* --- LINEAL OVERLAY STYLES --- */
        #rulerPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow: hidden; touch-action: none; }
        .ruler-scale { position: absolute; left: 0; top: 80px; bottom: 0; width: 75px; border-right: 2px solid #333; background: #fcfcfc; }
        .tick { position: absolute; right: 0; height: 1px; background: #333; }
        .tick.cm { width: 35px; border-top: 1px solid #000; }
        .tick.mid { width: 22px; background: #666; }
        .tick.mm { width: 12px; background: #bbb; }
        .cm-label { position: absolute; right: 40px; transform: translateY(-50%); font-size: 14px; font-weight: bold; }

        .slider-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--danger); z-index: 10; pointer-events: none; }
        .slider-handle { position: absolute; left: 85px; width: 65px; height: 65px; background: rgba(220, 53, 69, 0.15); border: 3px solid var(--danger); border-radius: 50%; transform: translateY(-50%); touch-action: none; z-index: 20; }
        
        .measurement-display { position: absolute; top: 30px; right: 20px; text-align: right; }
        .val-big { font-size: 2.8rem; font-weight: bold; color: var(--danger); }
        .saved-vals-grid { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 220px; }
        .saved-box { background: #eee; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; display: flex; justify-content: space-between; border-left: 3px solid var(--success); }

        .ruler-controls { position: absolute; bottom: 30px; left: 100px; right: 20px; display: flex; gap: 8px; }
        .ruler-controls button { margin: 0; flex: 1; font-size: 0.8rem; padding: 10px 5px; }

        /* Styling für die Raum-Gruppe */
.raum-gruppe {
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
}
.raum-header {
    background: #e9ecef !important; /* Grauer Balken */
    padding: 12px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ccc;
    -webkit-tap-highlight-color: transparent;
}
.raum-content {
    display: none; /* Erstmal alles verstecken */
    padding: 5px;
    background: white;
}
.raum-content.active {
    display: block !important; /* Nur zeigen, wenn 'active' gesetzt ist */
}

/* Die Box für die Ort-Auswahl im Alltag */
#ortWahlContainer {
    margin-top: 10px;
    border: 1px solid #007bff;
    border-radius: 8px;
    background: #fff;
    max-height: 300px;
    overflow-y: auto;
}
.wahl-raum-header {
    background: #f0f2f5;
    padding: 12px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}
.wahl-raum-content {
    display: none; /* Erstmal zu */
    background: #fff;
}
.wahl-ort-item {
    padding: 10px 20px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}
.wahl-ort-item:active { background: #e7f3ff; }
.gewaehlter-ort-info {
    padding: 10px;
    background: #e7f3ff;
    border-radius: 8px;
    margin-bottom: 5px;
    font-weight: bold;
    color: #007bff;
    border: 1px solid #007bff;
}



    </style>
</head>
<body>

    <div class="header-area">
        <h1>WD Logistik</h1>
        <button class="ruler-trigger" onclick="openRuler()">📏</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('alltag', this)">Alltag</button>
        <button class="tab-btn" onclick="showPage('verwalten', this)">Verwalten</button>
    </div>

        <div id="alltag" class="page active">
        <div class="card">
            <h2>🔍 Wo ist?</h2>
            <input type="text" id="searchInput" placeholder="Suchen..." oninput="suche()">
            <div id="ergebnisListe"></div>
        </div>

        <div class="card">
            <h2 id="editItemHeader">📍 Da ist!</h2>
            <input type="hidden" id="editItemID">
            
            <div style="position:relative;">
                <input type="text" id="itemName" placeholder="Gegenstand eingeben..." oninput="zeigeVorschlaege(this.value)" autocomplete="off">
                <div id="suggestionBox" class="suggestion-box"></div>
            </div>

            <div id="selectedOrtDisplay" style="padding: 10px; background: #e7f3ff; border-radius: 8px; margin-bottom: 5px; font-weight: bold; color: #007bff; border: 1px solid #007bff; font-size: 0.9rem;">
                Bitte Ort unten wählen...
            </div>
            
            <input type="hidden" id="ortSelect">

            <div id="ortWahlContainer" style="border: 1px solid #ddd; border-radius: 8px; max-height: 250px; overflow-y: auto; background: #fff;">
                </div>

            <button id="saveItemBtn" onclick="speichern()" style="margin-top: 15px;">Eintragen / Verschieben</button>
            <button id="cancelItemEditBtn" style="display:none; background:#6c757d;" onclick="abbruchItemEdit()">Abbrechen</button>
        </div>
    </div>


    <div id="verwalten" class="page">
        <div class="card">
            <h2 id="editOrtHeader">🏗️ Orte verwalten</h2>
            <input type="hidden" id="editOrtID">
            <input type="text" id="newRaum" placeholder="Raum">
            <input type="text" id="newSchrank" placeholder="Schrank / Regal">
            <input type="text" id="newFach" placeholder="Ablage / Schublade">
            <button id="saveOrtBtn" style="background:var(--success)" onclick="ortHinzufuegen()">Ort speichern</button>
            <button id="cancelOrtEditBtn" style="display:none; background:#6c757d;" onclick="abbruchOrtEdit()">Abbrechen</button>
            
            <h3>Bestehende Orte</h3>
            <div class="scroll-area" id="orteListe"></div>
        </div>

        <div class="file-actions">
            <button onclick="datenExportieren()">💾 JSON Export</button>
            <button onclick="document.getElementById('importFile').click()">📂 JSON Import</button>
            <input type="file" id="importFile" style="display:none" onchange="datenImportieren(event)" accept=".json">
        </div>
    </div>

    <div id="rulerPage">
        <div class="ruler-scale" id="rulerScale"></div>
        <div id="sliderLine" class="slider-line"></div>
        <div id="sliderHandle" class="slider-handle"></div>

        <div class="measurement-display">
            <div class="val-big"><span id="currentMM">0.0</span> cm</div>
            <div class="saved-vals-grid" id="savedGrid">
                <div class="saved-box">W1: <span class="s-val">-</span></div>
                <div class="saved-box">W2: <span class="s-val">-</span></div>
                <div class="saved-box">W3: <span class="s-val">-</span></div>
                <div class="saved-box">W4: <span class="s-val">-</span></div>
                <div class="saved-box">W5: <span class="s-val">-</span></div>
                <div class="saved-box">W6: <span class="s-val">-</span></div>
            </div>
        </div>

        <div class="ruler-controls">
            <button onclick="saveRulerValue()" style="background:var(--success)">Merken</button>
            <button onclick="resetRulerValues()" style="background:var(--info)">Löschen</button>
            <button onclick="calibrateRuler()" style="background:var(--warning); color:black;">Kalibr.</button>
            <button onclick="closeRuler()" style="background:var(--danger)">X</button>
        </div>
    </div>

    <script>
        let inventar = JSON.parse(localStorage.getItem('wd_inventar')) || [];
        let orte = JSON.parse(localStorage.getItem('wd_orte')) || [];
        let mmPx = parseFloat(localStorage.getItem('wd_mmPx')) || 3.78; 
        const offsetTop = 80;

        // --- LINEAL FUNKTIONEN ---
        function openRuler() { 
            document.getElementById('rulerPage').style.display = 'block'; 
            drawRuler();
            updateSlider(offsetTop); // Start bei Null
        }
        function closeRuler() { document.getElementById('rulerPage').style.display = 'none'; }

        function drawRuler() {
            const scale = document.getElementById('rulerScale');
            scale.innerHTML = '';
            for (let i = 0; i <= 400; i++) {
                const pos = i * mmPx;
                if (pos > window.innerHeight) break;
                const tick = document.createElement('div');
                if (i % 10 === 0) tick.className = 'tick cm';
                else if (i % 5 === 0) tick.className = 'tick mid';
                else tick.className = 'tick mm';
                tick.style.top = pos + 'px';
                scale.appendChild(tick);
                if (i % 10 === 0) {
                    const lbl = document.createElement('div');
                    lbl.className = 'cm-label';
                    lbl.style.top = pos + 'px';
                    lbl.innerText = i / 10;
                    scale.appendChild(lbl);
                }
            }
        }

        const handle = document.getElementById('sliderHandle');
        const line = document.getElementById('sliderLine');
        const display = document.getElementById('currentMM');
        
        function updateSlider(y) {
            // Hard Stop bei Null und Magnet-Effekt
            let mmRaw = (y - offsetTop) / mmPx;
            let mmSnapped = Math.max(0, Math.round(mmRaw)); 
            let finalY = (mmSnapped * mmPx) + offsetTop;

            handle.style.top = finalY + 'px';
            line.style.top = finalY + 'px';
            display.innerText = (mmSnapped / 10).toFixed(1);
        }

        handle.addEventListener('touchmove', (e) => {
            e.preventDefault();
            updateSlider(e.touches[0].clientY);
        }, {passive: false});

        function saveRulerValue() {
            const boxes = document.querySelectorAll('.s-val');
            for (let box of boxes) {
                if (box.innerText === "-") {
                    box.innerText = display.innerText + " cm";
                    break;
                }
            }
        }

        function resetRulerValues() {
            document.querySelectorAll('.s-val').forEach(box => box.innerText = "-");
        }

        function calibrateRuler() {
            let realVal = prompt("Kalibrierung: Lege echtes Lineal an. Was zeigt die App bei 10cm an?", display.innerText);
            if(realVal) {
                mmPx = mmPx * (10 / parseFloat(realVal));
                localStorage.setItem('wd_mmPx', mmPx);
                drawRuler();
            }
        }

        // --- DEINE STABILEN FUNKTIONEN (UNVERÄNDERT) ---
        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            updateUI();
        }

        async function datenExportieren() {
            const data = JSON.stringify({ inventar, orte, exportDate: Date.now() }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'wd_logistik.json',
                        types: [{ description: 'JSON', accept: {'application/json': ['.json']} }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                } else {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'wd_logistik.json'; a.click();
                    URL.revokeObjectURL(url);
                }
            } catch (err) {}
        }

        function datenImportieren(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!imported.inventar || !imported.orte) { alert("Formatfehler!"); return; }
                    const mode = confirm("Daten ZUSAMMENFÜHREN? (OK)\nÜBERSCHREIBEN? (Abbrechen)");
                    if (mode) {
                        imported.orte.forEach(newOrt => {
                            let idx = orte.findIndex(o => o.id === newOrt.id);
                            if (idx === -1) orte.push(newOrt);
                            else if (!orte[idx].lastModified || (newOrt.lastModified > orte[idx].lastModified)) orte[idx] = newOrt;
                        });
                        imported.inventar.forEach(newItem => {
                            let idx = inventar.findIndex(i => i.id === newItem.id);
                            if (idx === -1) inventar.push(newItem);
                            else if (!inventar[idx].lastModified || (newItem.lastModified > inventar[idx].lastModified)) inventar[idx] = newItem;
                        });
                    } else { inventar = imported.inventar; orte = imported.orte; }
                    localStorage.setItem('wd_inventar', JSON.stringify(inventar));
                    localStorage.setItem('wd_orte', JSON.stringify(orte));
                    updateUI();
                } catch (err) { alert("Formatfehler!"); }
            };
            reader.readAsText(file);
        }

        function ortHinzufuegen() {
            const r = document.getElementById('newRaum').value.trim();
            const s = document.getElementById('newSchrank').value.trim();
            const f = document.getElementById('newFach').value.trim();
            const editID = document.getElementById('editOrtID').value;
            if (!r || !s) return alert("Raum/Schrank?");
            if (editID) {
                let o = orte.find(ort => ort.id === editID);
                o.raum = r; o.schrank = s; o.fach = f; o.lastModified = Date.now();
                abbruchOrtEdit();
            } else {
                orte.push({ id: "LOC_" + Date.now(), raum: r, schrank: s, fach: f, lastModified: Date.now() });
                document.getElementById('newFach').value = ""; document.getElementById('newFach').focus();
            }
            saveAndRefresh();
        }

        function speichern() {
            const n = document.getElementById('itemName').value.trim();
            const oID = document.getElementById('ortSelect').value;
            const eID = document.getElementById('editItemID').value;
            if (!n || !oID) return alert("Name/Ort?");
            if (eID) {
                let item = inventar.find(i => i.id === eID);
                item.name = n; item.ortID = oID; item.lastModified = Date.now();
                abbruchItemEdit();
            } else {
                let ex = inventar.find(i => i.name.toLowerCase() === n.toLowerCase());
                if (ex) { ex.ortID = oID; ex.lastModified = Date.now(); alert("Verschoben."); }
                else { inventar.push({ id: "ITM_" + Date.now(), name: n, ortID: oID, lastModified: Date.now() }); alert("Neu angelegt."); }
            }
            localStorage.setItem('wd_inventar', JSON.stringify(inventar));
            document.getElementById('itemName').value = "";
            document.getElementById('suggestionBox').style.display = "none";
            suche();
        }

        function editOrt(id) {
            const o = orte.find(ort => ort.id === id);
            document.getElementById('newRaum').value = o.raum;
            document.getElementById('newSchrank').value = o.schrank;
            document.getElementById('newFach').value = o.fach;
            document.getElementById('editOrtID').value = o.id;
            document.getElementById('editOrtHeader').innerText = "✏️ Ort editieren";
            document.getElementById('saveOrtBtn').innerText = "Übernehmen";
            document.getElementById('cancelOrtEditBtn').style.display = "block";
        }

        function abbruchOrtEdit() {
            document.getElementById('editOrtID').value = "";
            document.getElementById('newRaum').value = ""; document.getElementById('newSchrank').value = ""; document.getElementById('newFach').value = "";
            document.getElementById('editOrtHeader').innerText = "🏗️ Orte verwalten";
            document.getElementById('saveOrtBtn').innerText = "Ort speichern";
            document.getElementById('cancelOrtEditBtn').style.display = "none";
        }

        function editItem(id) {
            const i = inventar.find(item => item.id === id);
            document.getElementById('itemName').value = i.name;
            document.getElementById('ortSelect').value = i.ortID;
            document.getElementById('editItemID').value = i.id;
            document.getElementById('editItemHeader').innerText = "✏️ Gegenstand editieren";
            document.getElementById('saveItemBtn').innerText = "Übernehmen";
            document.getElementById('cancelItemEditBtn').style.display = "block";
        }

        function abbruchItemEdit() {
            document.getElementById('editItemID').value = ""; document.getElementById('itemName').value = "";
            document.getElementById('editItemHeader').innerText = "📍 Da ist!";
            document.getElementById('saveItemBtn').innerText = "Eintragen / Verschieben";
            document.getElementById('cancelItemEditBtn').style.display = "none";
        }

        function suche() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const l = document.getElementById('ergebnisListe');
            l.innerHTML = ""; if (q.length < 2) return;
            inventar.filter(i => i.name.toLowerCase().includes(q)).forEach(t => {
                const o = orte.find(ort => ort.id === t.ortID);
                const d = document.createElement('div');
                d.className = "list-item";
                d.innerHTML = `<div><strong>${t.name}</strong><br><small>📍 ${o ? o.raum+", "+o.schrank+", "+o.fach : 'Unbekannt'}</small></div>
                                 <div><button class="edit" onclick="editItem('${t.id}')">✏️</button><button class="delete" onclick="deleteItem('${t.id}')">X</button></div>`;
                l.appendChild(d);
            });
        }

        function zeigeVorschlaege(val) {
            const b = document.getElementById('suggestionBox');
            b.innerHTML = ""; if (val.length < 2 || document.getElementById('editItemID').value) { b.style.display = "none"; return; }
            const tr = inventar.filter(i => i.name.toLowerCase().includes(val.toLowerCase()));
            if (tr.length > 0) {
                b.style.display = "block";
                tr.forEach(t => {
                    const d = document.createElement('div'); d.className = "suggestion-item"; d.innerText = t.name;
                    d.onclick = () => { document.getElementById('itemName').value = t.name; b.style.display = "none"; };
                    b.appendChild(d);
                });
            } else { b.style.display = "none"; }
        }

        function saveAndRefresh() { localStorage.setItem('wd_orte', JSON.stringify(orte)); updateUI(); }

        function updateUI() {
    const wahlContainer = document.getElementById('ortWahlContainer'); // Alltag Auswahl
    const l = document.getElementById('orteListe'); // Verwalten Liste
    const s = document.getElementById('ortSelect'); // Hidden Field oder altes Select
    
    if (!wahlContainer || !l) return;
    wahlContainer.innerHTML = "";
    l.innerHTML = "";

    // 1. Daten nach Räumen gruppieren
    const gruppiert = {};
    orte.forEach(o => {
        if (!gruppiert[o.raum]) gruppiert[o.raum] = [];
        gruppiert[o.raum].push(o);
    });

    // 2. Sortierte Räume durchgehen
    Object.keys(gruppiert).sort().forEach(raumName => {
        
        // --- BEREICH A: ALLTAG (RAUM-WAHL BOX) ---
        const wahlWrapper = document.createElement('div');
        wahlWrapper.className = "raum-gruppe";
        wahlWrapper.innerHTML = `
            <div class="raum-header" style="background:#e9ecef; padding:10px; cursor:pointer; font-weight:bold; border-bottom:1px solid #ddd;">
                <span>🏠 ${raumName}</span> <span>▼</span>
            </div>
            <div class="wahl-content" style="display:none; background:white;"></div>
        `;
        
        const wHeader = wahlWrapper.querySelector('.raum-header');
        const wContent = wahlWrapper.querySelector('.wahl-content');
        
        wHeader.onclick = () => {
            const isOpen = wContent.style.display === "block";
            wContent.style.display = isOpen ? "none" : "block";
            wHeader.querySelector('span:last-child').innerText = isOpen ? "▼" : "▲";
        };

        gruppiert[raumName].sort((a,b) => a.schrank.localeCompare(b.schrank)).forEach(o => {
            const item = document.createElement('div');
            item.className = "list-item";
            item.style.cursor = "pointer";
            item.innerText = `${o.schrank} > ${o.fach}`;
            item.onclick = () => {
                document.getElementById('ortSelect').value = o.id;
                document.getElementById('selectedOrtDisplay').innerText = `Gewählt: ${raumName} > ${o.schrank}`;
                wContent.style.display = "none"; // Zuklappen nach Wahl
            };
            wContent.appendChild(item);
        });
        wahlContainer.appendChild(wahlWrapper);

        // --- BEREICH B: VERWALTEN (BESTEHENDE ORTE MIT ALLEN BUTTONS) ---
        const verwaltWrapper = document.createElement('div');
        verwaltWrapper.className = "raum-gruppe";
        verwaltWrapper.innerHTML = `
            <div class="raum-header" style="background:#f0f2f5; padding:10px; cursor:pointer; font-weight:bold; border-bottom:1px solid #ddd;">
                <span>🏠 ${raumName} (Verwalten)</span> <span>▼</span>
            </div>
            <div class="verwalt-content" style="display:none; background:white;"></div>
        `;

        const vHeader = verwaltWrapper.querySelector('.raum-header');
        const vContent = verwaltWrapper.querySelector('.verwalt-content');

        vHeader.onclick = () => {
            const isOpen = vContent.style.display === "block";
            vContent.style.display = isOpen ? "none" : "block";
        };

        gruppiert[raumName].forEach(o => {
            const d = document.createElement('div');
            d.className = "list-item";
            d.innerHTML = `
                <span>${o.schrank} > ${o.fach}</span>
                <div>
                    <button class="info" onclick="zeigeInhalt('${o.id}')">i</button>
                    <button class="edit" onclick="editOrt('${o.id}')">✏️</button>
                    <button class="copy" onclick="copyOrt('${o.id}')">S</button>
                    <button class="delete" onclick="deleteOrt('${o.id}')">X</button>
                </div>`;
            vContent.appendChild(d);
        });
        l.appendChild(verwaltWrapper);
    });
}


        function zeigeInhalt(id) {
            const inh = inventar.filter(i => i.ortID === id).map(i => i.name);
            const o = orte.find(ort => ort.id === id);
            alert(`Inhalt von ${o.raum} > ${o.schrank} > ${o.fach}:\n\n` + (inh.length > 0 ? inh.join("\n") : "Leer"));
        }

        function deleteOrt(id) { if(confirm("Ort löschen?")) { orte = orte.filter(o => o.id !== id); saveAndRefresh(); } }
        function deleteItem(id) { if(confirm("Löschen?")) { inventar = inventar.filter(i => i.id !== id); localStorage.setItem('wd_inventar', JSON.stringify(inventar)); suche(); } }
        function copyOrt(id) {
            const o = orte.find(ort => ort.id === id);
            document.getElementById('newRaum').value = o.raum;
            document.getElementById('newSchrank').value = o.schrank;
            document.getElementById('newFach').value = "";
            document.getElementById('newFach').focus();
        }
        updateUI();

        function toggleRaum(element) {
    // Findet den Inhaltsbereich direkt unter dem angeklickten Header
    const content = element.nextElementSibling;
    content.classList.toggle('active');
    
    // Pfeil ändern
    const arrow = element.querySelector('small');
    if (content.classList.contains('active')) {
        arrow.innerText = '▲';
    } else {
        arrow.innerText = '▼';
    }
}


    </script>
